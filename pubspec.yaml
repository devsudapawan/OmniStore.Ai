name: omni_store_ai
description: "Offline-first AI business management app"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔹 Core
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  uuid: ^4.5.3
  intl: ^0.20.2
  logger: ^2.5.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.2.3

  # 🔹 Supabase
  supabase_flutter: ^2.12.0

  # 🔹 Firebase (notifications only)
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2

  # 🔹 UI
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_slidable: ^4.0.0
  fluttertoast: ^9.0.0
  image_picker: ^1.2.0
  url_launcher: ^6.3.1
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  flutter_floating_bottom_bar: ^1.3.0
  iconsax: ^0.0.8
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0
  flutter_native_splash: ^2.4.0
  path_provider: ^2.1.5

  # 🔹 Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 🔹 Code generation
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.7.1
  isar_community_generator: ^3.3.0

# ✅ This must be at ROOT level — not inside dev_dependencies
flutter_native_splash:
  color: "#1a1f2e"
  image: assets/images/OmniStore.Ai logo design.png
  color_dark: "#0d1117"
  image_dark: assets/images/ic_launcher.png

  android_12:
    image: assets/images/ic_launcher.png
    color: "#1a1f2e"
    icon_background_color: "#1a1f2e"

  web: false
  ios: true
  android: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/